apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: akp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oom-demo
      app.kubernetes.io/instance: oom
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oom-demo
        app.kubernetes.io/instance: oom
    spec:
      containers:
      - name: oom
        image: polinux/stress
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 100m
            memory: 178Mi
          limits:
            cpu: 100m
            memory: 178Mi
        startupProbe:
          exec:
            command: ["sleep", "5"]
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
