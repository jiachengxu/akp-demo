apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: akp-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oom-demo
      app.kubernetes.io/instance: oom
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oom-demo
        app.kubernetes.io/instance: oom
    spec:
      containers:
      - name: oom
        image: polinux/stress
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
        resources:
          limits:
            cpu: 100m
            memory: 178Mi
          requests:
            cpu: 100m
            memory: 178Mi
        securityContext:
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
        startupProbe:
          exec:
            command:
            - sleep
            - "5"
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 10
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      restartPolicy: Always
      dnsPolicy: ClusterFirst
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      securityContext: {}
